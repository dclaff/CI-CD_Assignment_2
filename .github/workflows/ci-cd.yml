name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Stage 1: Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservice

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: microservice-jar
          path: microservice/target/microservice-0.0.1-SNAPSHOT.jar
          retention-days: 1

  # ─── Stage 2: Test ───────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: microservice

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit and integration tests
        run: mvn -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: microservice/target/surefire-reports/

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: microservice/target/site/jacoco/

  # ─── Stage 3: Code Analysis (SonarCloud) ─────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: microservice

    steps:
      - name: Checkout source (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test and analyse with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=dclaff_CI-CD_Assignment_2 \
            -Dsonar.organization=dclaff \
            -Dsonar.host.url=https://sonarcloud.io

  # ─── Stage 4: Docker Build ───────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17 (to build JAR for Docker)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR for Docker image
        working-directory: microservice
        run: mvn -B -DskipTests package

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: microservice
          file: microservice/Dockerfile
          push: false
          load: true
          tags: microservice:${{ github.sha }}

      - name: Export Docker image to tar
        run: docker save microservice:${{ github.sha }} -o /tmp/microservice.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/microservice.tar
          retention-days: 1

  # ─── Stage 5: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/microservice.tar

      - name: Deploy container
        run: |
          docker stop microservice 2>/dev/null || true
          docker rm microservice 2>/dev/null || true
          docker run -d --name microservice -p 8082:8082 \
            microservice:${{ github.sha }}
          echo "Container started: $(docker ps --filter name=microservice --format '{{.Status}}')"
