# Server
server.port=8082

# Database
spring.datasource.url=jdbc:sqlite:./data/microservice.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.initialization-mode=always
spring.sql.init.mode=always
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys = ON

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.service-b.register-health-indicator=true
resilience4j.circuitbreaker.instances.service-b.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.service-b.sliding-window-size=5
resilience4j.circuitbreaker.instances.service-b.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.service-b.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.service-b.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.service-b.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j - Retry
resilience4j.retry.instances.service-b.max-attempts=3
resilience4j.retry.instances.service-b.wait-duration=500ms

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.endpoints.web.exposure.include=health,info,circuitbreakers,retries,metrics
